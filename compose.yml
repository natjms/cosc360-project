services:
  mongo:
    container_name: library-mongo
    image: mongo:7
    volumes:
      - mongo_data:/data/db
  frontend:
    container_name: library-frontend
    image: library-frontend
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - type: bind
        source: ./frontend
        target: /frontend
      - frontend_node_modules:/frontend/node_modules
  backend:
    container_name: library-backend
    image: library-backend
    build: ./backend
    volumes:
      - type: bind
        source: ./backend
        target: /backend
      - uploaded_images:/uploaded_images/
      - backend_node_modules:/backend/node_modules

volumes:
  mongo_data:
  uploaded_images:
  frontend_node_modules:
  backend_node_modules:
